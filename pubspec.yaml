name: astro_portable
description: Real-time astrological sky chart using Swiss Ephemeris, fully offline.
# applicationId is com.astroapp.portable (set in android/app/build.gradle.kts)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sweph: ^2.10.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ephe/
